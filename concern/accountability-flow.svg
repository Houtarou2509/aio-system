<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2400" viewBox="0 0 1800 2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e8eef7"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#012061"/>
      <stop offset="100%" stop-color="#00133d"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8931f"/>
      <stop offset="100%" stop-color="#e67600"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#012061" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#012061"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8931f"/>
    </marker>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:58px;font-weight:800;fill:#fff;letter-spacing:-1px}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:500;fill:#dbeafe}
      .section{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:800;fill:#012061;letter-spacing:2px}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:800;fill:#0f172a}
      .body{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:500;fill:#475569}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:600;fill:#64748b}
      .whiteh{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:800;fill:#fff}
      .whitebody{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:500;fill:#e2e8f0}
      .tag{font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:800;fill:#fff;letter-spacing:1px}
      .num{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:900;fill:#fff}
      .line{fill:none;stroke:#012061;stroke-width:5;marker-end:url(#arrow)}
      .lineO{fill:none;stroke:#f8931f;stroke-width:5;marker-end:url(#arrowOrange)}
      .dash{fill:none;stroke:#7B1113;stroke-width:4;stroke-dasharray:12 10;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1800" height="2400" fill="url(#bg)"/>
  <g opacity="0.24">
    <path d="M0 120 H1800 M0 240 H1800 M0 360 H1800 M0 480 H1800 M0 600 H1800 M0 720 H1800 M0 840 H1800 M0 960 H1800 M0 1080 H1800 M0 1200 H1800 M0 1320 H1800 M0 1440 H1800 M0 1560 H1800 M0 1680 H1800 M0 1800 H1800 M0 1920 H1800 M0 2040 H1800 M0 2160 H1800 M0 2280 H1800" stroke="#cbd5e1" stroke-width="1"/>
    <path d="M120 0 V2400 M240 0 V2400 M360 0 V2400 M480 0 V2400 M600 0 V2400 M720 0 V2400 M840 0 V2400 M960 0 V2400 M1080 0 V2400 M1200 0 V2400 M1320 0 V2400 M1440 0 V2400 M1560 0 V2400 M1680 0 V2400" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <rect x="70" y="55" width="1660" height="185" rx="34" fill="url(#navy)" filter="url(#shadow)"/>
  <circle cx="135" cy="120" r="18" fill="#f8931f"/>
  <text x="175" y="130" class="title">AIO System Accountability Flow</text>
  <text x="175" y="180" class="subtitle">From profile creation to asset issuance, agreement documents, sign-off, return, and reassignment</text>
  <text x="1455" y="132" class="tag">DRDF ASSET ACCOUNTABILITY</text>
  <rect x="1450" y="152" width="200" height="8" rx="4" fill="#f8931f"/>

  <!-- swimlane labels -->
  <rect x="95" y="300" width="410" height="52" rx="16" fill="#fff" stroke="#dbe3ef" stroke-width="2" filter="url(#soft)"/>
  <text x="130" y="334" class="section">SETUP</text>
  <rect x="695" y="300" width="410" height="52" rx="16" fill="#fff" stroke="#dbe3ef" stroke-width="2" filter="url(#soft)"/>
  <text x="730" y="334" class="section">ISSUANCE</text>
  <rect x="1295" y="300" width="410" height="52" rx="16" fill="#fff" stroke="#dbe3ef" stroke-width="2" filter="url(#soft)"/>
  <text x="1330" y="334" class="section">LIFECYCLE</text>

  <!-- left setup column -->
  <g filter="url(#soft)">
    <rect x="95" y="400" width="410" height="170" rx="24" fill="#fff" stroke="#012061" stroke-width="3"/>
    <circle cx="135" cy="440" r="24" fill="url(#orange)"/><text x="127" y="449" class="num">1</text>
    <text x="175" y="440" class="h">Create Personnel Profile</text>
    <text x="130" y="490" class="body">Add recipient profile details:</text>
    <text x="130" y="520" class="small">Name, designation, project, institution,</text>
    <text x="130" y="548" class="small">contact details, readiness for issuance.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="95" y="660" width="410" height="185" rx="24" fill="#fff" stroke="#012061" stroke-width="3"/>
    <circle cx="135" cy="700" r="24" fill="url(#orange)"/><text x="127" y="709" class="num">2</text>
    <text x="175" y="700" class="h">Create / Maintain Assets</text>
    <text x="130" y="750" class="body">Assets must be recorded first:</text>
    <text x="130" y="780" class="small">Asset name, property number, serial,</text>
    <text x="130" y="808" class="small">location, type, status = AVAILABLE.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="95" y="935" width="410" height="225" rx="24" fill="#fff" stroke="#012061" stroke-width="3"/>
    <circle cx="135" cy="975" r="24" fill="url(#orange)"/><text x="127" y="984" class="num">3</text>
    <text x="175" y="975" class="h">Agreement Template</text>
    <text x="130" y="1025" class="body">Admin creates reusable template:</text>
    <text x="130" y="1055" class="small">• DRDF letter body and terms</text>
    <text x="130" y="1083" class="small">• placeholders: {{personnelName}}</text>
    <text x="130" y="1111" class="small">• smart variables: {{assetSection}}</text>
    <text x="130" y="1139" class="small">• default officer / authorized rep</text>
  </g>

  <!-- issuance column -->
  <g filter="url(#soft)">
    <rect x="695" y="400" width="410" height="185" rx="24" fill="#fff" stroke="#f8931f" stroke-width="3"/>
    <circle cx="735" cy="440" r="24" fill="#012061"/><text x="727" y="449" class="num">4</text>
    <text x="775" y="440" class="h">Start Issuance Wizard</text>
    <text x="730" y="490" class="body">Select ready profile and available asset(s).</text>
    <text x="730" y="520" class="small">Supports one asset or multiple assets</text>
    <text x="730" y="548" class="small">under one accountability agreement.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="695" y="675" width="410" height="200" rx="24" fill="#fff" stroke="#f8931f" stroke-width="3"/>
    <circle cx="735" cy="715" r="24" fill="#012061"/><text x="727" y="724" class="num">5</text>
    <text x="775" y="715" class="h">Reserve Selected Assets</text>
    <text x="730" y="765" class="body">During issuance completion:</text>
    <text x="730" y="795" class="small">Assets are locked / moved through</text>
    <text x="730" y="823" class="small">pending assignment logic to avoid</text>
    <text x="730" y="851" class="small">double-issuing the same asset.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="695" y="965" width="410" height="235" rx="24" fill="#fff" stroke="#f8931f" stroke-width="3"/>
    <circle cx="735" cy="1005" r="24" fill="#012061"/><text x="727" y="1014" class="num">6</text>
    <text x="775" y="1005" class="h">Generate Agreement Text</text>
    <text x="730" y="1055" class="body">Template parser resolves placeholders:</text>
    <text x="730" y="1085" class="small">recipient + designation + project</text>
    <text x="730" y="1113" class="small">asset paragraph / asset table</text>
    <text x="730" y="1141" class="small">single vs multiple asset wording</text>
    <text x="730" y="1169" class="small">property officer and authorized rep</text>
  </g>

  <g filter="url(#soft)">
    <rect x="695" y="1290" width="410" height="205" rx="24" fill="#fff" stroke="#f8931f" stroke-width="3"/>
    <circle cx="735" cy="1330" r="24" fill="#012061"/><text x="727" y="1339" class="num">7</text>
    <text x="775" y="1330" class="h">Create Assignment Records</text>
    <text x="730" y="1380" class="body">System records accountability:</text>
    <text x="730" y="1410" class="small">Assignment rows + bulkBatchId if grouped</text>
    <text x="730" y="1438" class="small">Asset status becomes ASSIGNED</text>
    <text x="730" y="1466" class="small">Audit logs capture the issuance.</text>
  </g>

  <!-- lifecycle column -->
  <g filter="url(#soft)">
    <rect x="1295" y="400" width="410" height="220" rx="24" fill="#fff" stroke="#7B1113" stroke-width="3"/>
    <circle cx="1335" cy="440" r="24" fill="#7B1113"/><text x="1327" y="449" class="num">8</text>
    <text x="1375" y="440" class="h">Immutable Document Snapshot</text>
    <text x="1330" y="490" class="body">AgreementDocument stores history:</text>
    <text x="1330" y="520" class="small">resolved text, asset snapshot, profile</text>
    <text x="1330" y="548" class="small">snapshot, template/version metadata,</text>
    <text x="1330" y="576" class="small">document number and sign-off state.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="1295" y="710" width="410" height="185" rx="24" fill="#fff" stroke="#7B1113" stroke-width="3"/>
    <circle cx="1335" cy="750" r="24" fill="#7B1113"/><text x="1327" y="759" class="num">9</text>
    <text x="1375" y="750" class="h">PDF Preview / Download</text>
    <text x="1330" y="800" class="body">PDFKit renders A4 agreement letter:</text>
    <text x="1330" y="830" class="small">letterhead, metadata, asset section,</text>
    <text x="1330" y="858" class="small">terms, signatures, document number.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="1295" y="985" width="410" height="205" rx="24" fill="#fff" stroke="#7B1113" stroke-width="3"/>
    <circle cx="1335" cy="1025" r="24" fill="#7B1113"/><text x="1327" y="1034" class="num">10</text>
    <text x="1375" y="1025" class="h">Recipient Sign-off</text>
    <text x="1330" y="1075" class="body">Recipient acknowledges accountability.</text>
    <text x="1330" y="1105" class="small">Digital sign-off stores signer name,</text>
    <text x="1330" y="1133" class="small">date, method, IP, and signs all active</text>
    <text x="1330" y="1161" class="small">batch assignments when applicable.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="1295" y="1280" width="410" height="185" rx="24" fill="#fff" stroke="#7B1113" stroke-width="3"/>
    <circle cx="1335" cy="1320" r="24" fill="#7B1113"/><text x="1327" y="1329" class="num">11</text>
    <text x="1375" y="1320" class="h">Signed Copy Upload</text>
    <text x="1330" y="1370" class="body">Optional scanned signed PDF is attached.</text>
    <text x="1330" y="1400" class="small">Used for formal document retention,</text>
    <text x="1330" y="1428" class="small">viewing, replacement, and download.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="195" y="1625" width="1410" height="250" rx="34" fill="url(#navy)"/>
    <text x="245" y="1692" class="whiteh">Active Accountability State</text>
    <text x="245" y="1742" class="whitebody">While an assignment is active, the recipient is accountable for safekeeping, official use, reporting loss/damage, and returning the asset when requested.</text>
    <rect x="245" y="1790" width="285" height="44" rx="22" fill="#f8931f"/><text x="276" y="1819" class="tag">ASSET = ASSIGNED</text>
    <rect x="560" y="1790" width="340" height="44" rx="22" fill="#0f766e"/><text x="592" y="1819" class="tag">ISSUANCE = ACTIVE</text>
    <rect x="930" y="1790" width="300" height="44" rx="22" fill="#7B1113"/><text x="962" y="1819" class="tag">AUDIT TRAIL ON</text>
    <rect x="1260" y="1790" width="290" height="44" rx="22" fill="#334155"/><text x="1292" y="1819" class="tag">PDF RETAINED</text>
  </g>

  <g filter="url(#soft)">
    <rect x="235" y="2010" width="430" height="190" rx="28" fill="#fff" stroke="#012061" stroke-width="3"/>
    <circle cx="275" cy="2050" r="24" fill="url(#orange)"/><text x="267" y="2059" class="num">12</text>
    <text x="315" y="2050" class="h">Return Asset</text>
    <text x="270" y="2100" class="body">Property officer marks assignment returned.</text>
    <text x="270" y="2130" class="small">returnedAt is saved; return condition</text>
    <text x="270" y="2158" class="small">can be recorded as Good / etc.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="685" y="2010" width="430" height="190" rx="28" fill="#fff" stroke="#012061" stroke-width="3"/>
    <circle cx="725" cy="2050" r="24" fill="url(#orange)"/><text x="717" y="2059" class="num">13</text>
    <text x="765" y="2050" class="h">Asset Becomes Available</text>
    <text x="720" y="2100" class="body">Backend updates asset status:</text>
    <text x="720" y="2130" class="small">ASSIGNED → AVAILABLE</text>
    <text x="720" y="2158" class="small">It can now be issued again.</text>
  </g>

  <g filter="url(#soft)">
    <rect x="1135" y="2010" width="430" height="190" rx="28" fill="#fff" stroke="#012061" stroke-width="3"/>
    <circle cx="1175" cy="2050" r="24" fill="url(#orange)"/><text x="1167" y="2059" class="num">14</text>
    <text x="1215" y="2050" class="h">Reports + History</text>
    <text x="1170" y="2100" class="body">Records remain searchable:</text>
    <text x="1170" y="2130" class="small">who received what, when it was signed,</text>
    <text x="1170" y="2158" class="small">and when it was returned.</text>
  </g>

  <!-- arrows -->
  <path class="line" d="M505 485 C585 485 615 492 695 492"/>
  <path class="line" d="M505 752 C595 752 605 520 695 520"/>
  <path class="lineO" d="M505 1048 C615 1048 585 550 695 550"/>
  <path class="lineO" d="M900 585 L900 675"/>
  <path class="lineO" d="M900 875 L900 965"/>
  <path class="lineO" d="M900 1200 L900 1290"/>
  <path class="line" d="M1105 1392 C1195 1392 1205 510 1295 510"/>
  <path class="line" d="M1500 620 L1500 710"/>
  <path class="line" d="M1500 895 L1500 985"/>
  <path class="line" d="M1500 1190 L1500 1280"/>
  <path class="lineO" d="M1500 1465 C1500 1540 900 1540 900 1625"/>
  <path class="lineO" d="M900 1875 C900 1945 450 1945 450 2010"/>
  <path class="line" d="M665 2105 L685 2105"/>
  <path class="line" d="M1115 2105 L1135 2105"/>
  <path class="dash" d="M900 2200 C900 2290 220 2290 220 845 C220 845 220 845 220 845"/>

  <!-- footer legend -->
  <rect x="70" y="2295" width="1660" height="60" rx="20" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
  <circle cx="120" cy="2325" r="10" fill="#012061"/><text x="145" y="2332" class="small">Navy = system records / statuses</text>
  <circle cx="465" cy="2325" r="10" fill="#f8931f"/><text x="490" y="2332" class="small">Orange = issuance actions</text>
  <circle cx="790" cy="2325" r="10" fill="#7B1113"/><text x="815" y="2332" class="small">Red = formal document lifecycle</text>
  <line x1="1160" y1="2325" x2="1240" y2="2325" stroke="#7B1113" stroke-width="4" stroke-dasharray="10 8"/><text x="1260" y="2332" class="small">Dashed loop = returned asset can be reassigned</text>
</svg>
